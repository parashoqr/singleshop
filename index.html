<!DOCTYPE html>
<html>
<body>
<h2>Test Shop Admin</h2>

<!-- Toggle Shop -->
<label>
  <input type="checkbox" id="shopToggle"> Shop ON/OFF
</label>
<span id="toggleStatus"></span>
<br><br>

<!-- Add Product -->
<form id="form">
  <input name="name" placeholder="Name" required>
  <input name="price" placeholder="Price" required>
  <input name="category" placeholder="Category" required>
  <input name="image" placeholder="Image URL">
  <textarea name="description" placeholder="Description"></textarea>
  <button>Add Product</button>
</form>

<h3>Products</h3>
<ul id="list"></ul>

<script>
const EXEC_URL = "https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec"; // your /exec URL

// Fetch and display products
async function fetchProducts(){
  const res = await fetch(EXEC_URL);
  const data = await res.json();
  document.getElementById("toggleStatus").innerText = data.shopStatus.toUpperCase();

  const list = document.getElementById("list");
  list.innerHTML = "";
  data.products.forEach(p=>{
    const li = document.createElement("li");
    li.innerHTML = `${p.name} | ${p.price} | ${p.category} 
      <button onclick="deleteProduct(${p.rowIndex})">Delete</button>`;
    list.appendChild(li);
  });
}

// Add Product
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(this).entries());
  const res = await fetch(EXEC_URL, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  alert(await res.text());
  this.reset();
  fetchProducts();
});

// Delete Product
async function deleteProduct(row){
  if(!confirm("Delete this product?")) return;
  const res = await fetch(EXEC_URL + "?row=" + row, { method:"DELETE" });
  alert(await res.text());
  fetchProducts();
}

// Toggle Shop
document.getElementById("shopToggle").addEventListener("change", async function(){
  const status = this.checked ? "on" : "off";
  const res = await fetch(EXEC_URL + "?shopStatus=" + status, { method:"POST" });
  alert(await res.text());
  fetchProducts();
});

// Initial load
fetchProducts();
</script>
</body>
</html>
