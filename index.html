<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>

<body style="font-family: Arial, sans-serif; max-width:500px; margin:auto; padding:20px;">

<h2 style="text-align:center;">Add Product</h2>

<form id="productForm" style="margin-bottom:30px;">
  <input type="text" name="name" placeholder="Product Name" required style="width:100%; padding:8px;"><br><br>
  <input type="text" name="description" placeholder="Description" required style="width:100%; padding:8px;"><br><br>
  <input type="text" name="category" placeholder="Category" style="width:100%; padding:8px;"><br><br>
  <input type="number" name="price" placeholder="Price" required style="width:100%; padding:8px;"><br><br>
  <input type="text" name="image" placeholder="Image URL" style="width:100%; padding:8px;"><br><br>

  <button type="submit" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:6px;">
    Add Product
  </button>
</form>

<hr>

<h2 style="text-align:center;">Products Dashboard</h2>
<div id="adminProducts"></div>

<script>
const adminUrl = "https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec"; // ← PUT NEW EXEC URL HERE

// ✅ ADD PRODUCT
document.getElementById("productForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const formData = new FormData(this);

  fetch(adminUrl, {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    this.reset();
    fetchAdminProducts();
  });
});

// ✅ FETCH PRODUCTS
function fetchAdminProducts() {
  fetch(adminUrl)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("adminProducts");
      container.innerHTML = "";

      data.forEach((p, index) => {
        container.innerHTML += `
          <div style="
            border:1px solid #ddd;
            padding:10px;
            margin:8px 0;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-radius:8px;
            background:#f9f9f9;">
            
            <span>${p.name} - ₹${p.price}</span>

            <button onclick="deleteProduct(${index+2})"
              style="
                background:#ff4d4d;
                color:white;
                border:none;
                padding:6px 12px;
                border-radius:6px;
                cursor:pointer;">
              Delete
            </button>
          </div>
        `;
      });
    });
}

// ✅ DELETE PRODUCT
function deleteProduct(row) {
  if (!confirm("Are you sure you want to delete this product?")) return;

  fetch(`${adminUrl}?deleteRow=${row}`)
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      fetchAdminProducts();
    });
}

// Load products on page open
fetchAdminProducts();
</script>

</body>
</html>
