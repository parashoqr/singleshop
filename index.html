<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Admin Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background:#f9f9f9; margin:20px; }
h1 { color:#333; }
table { width:100%; border-collapse: collapse; margin-bottom:20px; }
table, th, td { border:1px solid #ccc; }
th, td { padding:10px; text-align:left; }
th { background:#eee; }
button { padding:5px 10px; margin:2px; cursor:pointer; }
form { background:#fff; padding:15px; border-radius:5px; max-width:500px; margin-bottom:20px; box-shadow:0 0 5px rgba(0,0,0,0.1); }
input, textarea { width:100%; padding:8px; margin:5px 0; box-sizing:border-box; }
.toggle-btn { padding:8px 15px; font-weight:bold; }
</style>
</head>
<body>

<h1>Shop Admin / Shopkeeper Dashboard</h1>

<!-- Toggle Shop Status -->
<label>
  <input type="checkbox" id="shopToggle"> Shop ON/OFF
</label>
<span id="toggleStatus"></span>

<hr>

<!-- Add Product Form -->
<h2>Add Product</h2>
<form id="addProductForm">
  <label>Product Name</label>
  <input type="text" name="name" required>
  
  <label>Price</label>
  <input type="number" name="price" required>
  
  <label>Description</label>
  <textarea name="description" required></textarea>
  
  <label>Category</label>
  <input type="text" name="category" required>
  
  <label>Image URL</label>
  <input type="text" name="image" placeholder="Paste public image URL" required>
  
  <button type="submit">Add Product</button>
</form>

<hr>

<!-- Product List -->
<h2>All Products</h2>
<table id="productsTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Price</th>
      <th>Description</th>
      <th>Category</th>
      <th>Image</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const EXEC_URL = "https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec"; // <-- your /exec URL

// --------------------
// Fetch Products + Shop Status
// --------------------
async function fetchProducts(){
  try{
    const res = await fetch(EXEC_URL);
    const data = await res.json();
    
    // Toggle
    const toggle = document.getElementById("shopToggle");
    toggle.checked = data.shopStatus === "on";
    document.getElementById("toggleStatus").innerText = data.shopStatus.toUpperCase();

    // Products Table
    const tbody = document.querySelector("#productsTable tbody");
    tbody.innerHTML = "";
    data.products.forEach(p=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td>${p.description}</td>
        <td>${p.category}</td>
        <td>${p.image ? '<img src="'+p.image+'" width="60">' : 'No Image'}</td>
        <td>
          <button onclick="deleteProduct(${p.rowIndex})">Delete</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }catch(err){
    alert("Error fetching products: " + err);
  }
}

// --------------------
// Add Product
// --------------------
document.getElementById("addProductForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const formData = new FormData(this);
  const data = {};
  formData.forEach((v,k)=>data[k]=v);
  
  try{
    const res = await fetch(EXEC_URL, {
      method:"POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });
    const text = await res.text();
    alert(text);
    this.reset();
    fetchProducts();
  }catch(err){
    alert("Error adding product: " + err);
  }
});

// --------------------
// Delete Product
// --------------------
async function deleteProduct(row){
  if(!confirm("Are you sure you want to delete this product?")) return;
  try{
    const res = await fetch(EXEC_URL + "?row=" + row, { method:"DELETE" });
    const text = await res.text();
    alert(text);
    fetchProducts();
  }catch(err){
    alert("Error deleting product: " + err);
  }
}

// --------------------
// Toggle Shop ON/OFF
// --------------------
document.getElementById("shopToggle").addEventListener("change", async function(){
  const status = this.checked ? "on" : "off";
  try{
    const res = await fetch(EXEC_URL + "?shopStatus=" + status, { method:"POST" });
    const text = await res.text();
    document.getElementById("toggleStatus").innerText = status.toUpperCase();
    console.log(text);
  }catch(err){
    alert("Error toggling shop: " + err);
  }
});

// --------------------
// Initial Load
// --------------------
fetchProducts();
</script>

</body>
</html>
