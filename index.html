<!DOCTYPE html>
<html>
<head>
  <title>Add Product</title>
</head>
<body style="font-family: Arial, sans-serif; max-width:400px; margin:auto; padding:20px;">
<h2 style="text-align:center;">Add Product</h2>

<form id="productForm">
  <input type="text" name="name" placeholder="Product Name" required><br><br>
  <input type="text" name="description" placeholder="Description" required><br><br>
  <input type="text" name="category" placeholder="Category"><br><br>
  <input type="number" name="price" placeholder="Price" required><br><br>
  <input type="text" name="image" placeholder="Image URL"><br><br>

  <button type="submit">Add Product</button>
</form>

<script>
document.getElementById("productForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const formData = new FormData(this);

  function fetchAdminProducts(){
  fetch("PASTE_YOUR_EXEC_URL_HERE")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("adminProducts");
    container.innerHTML = "";
    data.forEach((p, index) => {
      container.innerHTML += `
        <div style="border:1px solid #ccc; padding:8px; margin:5px; border-radius:5px; display:flex; justify-content:space-between; align-items:center; background:#f9f9f9;">
          <span>${p.name} - ₹${p.price} - ${p.category}</span>
          <button onclick="deleteProduct(${index+2})" style="padding:5px 10px; background:#ff4d4d; color:white; border:none; border-radius:4px; cursor:pointer;">Delete</button>
        </div>
      `;
    });
  });
}

function deleteProduct(row){
  fetch(`PASTE_YOUR_EXEC_URL_HERE?row=${row}`, { method: "DELETE" })
  .then(res => res.text())
  .then(resp => {
    alert(resp);
    fetchAdminProducts();
  })
  .catch(err => console.log(err));
}

// Initial load
fetchAdminProducts();
</script>

</body>
</html>
