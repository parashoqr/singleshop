<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Dashboard</title>
<style>
body{font-family:sans-serif;background:#f0f2f5;margin:0;padding:0;}
.container{max-width:1000px;margin:auto;padding:20px;}
form{display:flex;flex-direction:column;gap:12px;background:#e6f2ff;padding:20px;border-radius:10px;}
input,textarea{padding:10px;border-radius:8px;border:1px solid #ccc;width:100%;}
button{padding:12px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:15px;}
.product-card{background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);padding:15px;text-align:center;position:relative;}
.product-card img{width:100%;height:150px;object-fit:cover;border-radius:8px;}
.btn-delete{background:#ff4d4d;color:white;position:absolute;top:10px;right:10px;font-size:12px;}
</style>
</head>
<body>
<div class="container">
<h1>Shop Dashboard</h1>

<div id="shopToggleContainer" style="display:none;">
<label>Shop Status:</label>
<button id="toggleShop"></button>
</div>

<form id="addProductForm">
<input name="name" placeholder="Product Name" required>
<input name="price" placeholder="Price" type="number" required>
<textarea name="description" placeholder="Description" required></textarea>
<input name="category" placeholder="Category" required>
<label>Choose Product Image:</label>
<input type="file" id="imageFile" accept="image/*" required>
<button type="submit">Add Product</button>
</form>

<select id="categoryFilter">
<option value="all">All</option>
</select>

<div class="product-grid" id="shopContainer"></div>
</div>

<script>
const EXEC_URL = "https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec";
const urlParams = new URLSearchParams(window.location.search);
const isAdmin = urlParams.get("admin")==="true";
let allProducts = [];

document.getElementById("shopToggleContainer").style.display = isAdmin?"block":"none";

// Fetch products
async function fetchProducts(){
  const res = await fetch(EXEC_URL);
  const data = await res.json();
  allProducts = data.products;

  // Update toggle
  if(isAdmin){
    const btn = document.getElementById("toggleShop");
    btn.textContent = data.shopStatus.toUpperCase();
    btn.style.background = data.shopStatus==="on"?"#28a745":"#ff4d4d";
    btn.style.color="white";
    btn.onclick = ()=>toggleShop(data.shopStatus==="on"?"off":"on");
  }

  populateFilter(allProducts);
  displayProducts(allProducts, data.shopStatus);
}

function populateFilter(products){
  const select = document.getElementById("categoryFilter");
  const cats = [...new Set(products.map(p=>p.category))];
  select.innerHTML='<option value="all">All</option>';
  cats.forEach(c=>select.innerHTML+=`<option value="${c}">${c}</option>`);
}

function displayProducts(products, shopStatus){
  const container = document.getElementById("shopContainer");
  container.innerHTML="";
  if(shopStatus!=="on"){ container.innerHTML="<h2>Shop is closed</h2>"; return;}
  const filter = document.getElementById("categoryFilter").value;
  const filtered = filter==="all"?products:products.filter(p=>p.category===filter);
  filtered.forEach(p=>{
    const card = document.createElement("div");
    card.className="product-card";
    card.innerHTML=`
      <img src="${p.image}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <p>${p.description}</p>
      <small>${p.category}</small>
    `;
    if(isAdmin){
      const btn = document.createElement("button");
      btn.className="btn-delete";
      btn.textContent="Delete";
      btn.onclick = ()=>deleteProduct(p.rowIndex);
      card.appendChild(btn);
    }
    container.appendChild(card);
  });
}

document.getElementById("categoryFilter").addEventListener("change",()=>displayProducts(allProducts,"on"));

// Add product
document.getElementById("addProductForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const file = document.getElementById("imageFile").files[0];
  if(!file){ alert("Select an image!"); return; }
  const formData = new FormData();
  formData.append("myFileBlob", file);

  const imageUrl = await fetch(EXEC_URL,{method:"POST",body:formData}).then(r=>r.text());
  const data = {
    name:this.name.value,
    price:this.price.value,
    description:this.description.value,
    category:this.category.value,
    image:imageUrl
  };
  await fetch(EXEC_URL,{method:"POST",body:JSON.stringify(data)});
  this.reset();
  fetchProducts();
});

// Delete product
function deleteProduct(row){
  fetch(`${EXEC_URL}?row=${row}`,{method:"DELETE"}).then(r=>r.text()).then(()=>fetchProducts());
}

// Toggle shop
function toggleShop(status){
  fetch(`${EXEC_URL}?shopStatus=${status}`,{method:"POST"}).then(()=>fetchProducts());
}

// Initial load
fetchProducts();
</script>
</body>
</html>
