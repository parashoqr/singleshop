<!DOCTYPE html>
<html>
<head>
  <title>Add Product</title>
</head>
<body style="font-family: Arial, sans-serif; max-width:400px; margin:auto; padding:20px;">
<h2 style="text-align:center;">Add Product</h2>

<form id="productForm">
  <input type="text" name="name" placeholder="Product Name" required><br><br>
  <input type="text" name="description" placeholder="Description" required><br><br>
  <input type="text" name="category" placeholder="Category"><br><br>
  <input type="number" name="price" placeholder="Price" required><br><br>
  <input type="text" name="image" placeholder="Image URL"><br><br>

  <button type="submit">Add Product</button>
</form>

<script>
const adminUrl = "PASTE_NEW_EXEC_URL_HERE";

function fetchAdminProducts() {
  fetch(adminUrl)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("adminProducts");
      container.innerHTML = "";

      data.forEach((p, index) => {
        container.innerHTML += `
          <div style="
            border:1px solid #ddd;
            padding:10px;
            margin:8px 0;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-radius:8px;
            background:#f9f9f9;">
            
            <span>${p.name} - ₹${p.price}</span>

            <button onclick="deleteProduct(${index+2})"
              style="
                background:#ff4d4d;
                color:white;
                border:none;
                padding:6px 12px;
                border-radius:6px;
                cursor:pointer;">
              Delete
            </button>
          </div>
        `;
      });
    });
}

function deleteProduct(row) {
  if (!confirm("Are you sure you want to delete this product?")) return;

  fetch(`${adminUrl}?deleteRow=${row}`)
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      fetchAdminProducts();
    });
}

// Load products when page opens
fetchAdminProducts();
</script>

</body>
</html>
