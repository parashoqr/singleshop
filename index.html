<!DOCTYPE html>
<html>
<body>
<h2>Test Add Product</h2>
<form id="form">
  <input name="name" placeholder="Name">
  <input name="price" placeholder="Price">
  <button>Add</button>
</form>

<script>
const EXEC_URL = "https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec";

document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();
  const data = { name: this.name.value, price: this.price.value, description:"desc", image:"", category:"test" };
  try{
    const res = await fetch(EXEC_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data) });
    alert(await res.text());
  }catch(err){ alert(err); }
});
</script>
</body>
</html>
