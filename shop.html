<!DOCTYPE html>
<html>
<head>
  <title>My Shop</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    h2 {
      margin: 0;
    }
  </style>
</head>
<body>

<h1>My Shop</h1>

<select id="categoryFilter">
  <option value="all">All Categories</option>
</select>

<br><br>

<div id="products"></div>

<script>
const url = "PASTE_YOUR_LATEST_EXEC_URL_HERE";

let allProducts = [];

fetch(url)
.then(response => response.json())
.then(data => {
  allProducts = data;
  populateCategories(data);
  displayProducts(data);
})
.catch(error => {
  document.getElementById("products").innerHTML = "Error loading products";
  console.log(error);
});

function populateCategories(products) {
  const dropdown = document.getElementById("categoryFilter");
  const categories = [...new Set(products.map(p => p.category))];

  categories.forEach(cat => {
    if (cat) {
      dropdown.innerHTML += `<option value="${cat}">${cat}</option>`;
    }
  });
}

function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(product => {
    container.innerHTML += `
      <div class="product">
        <img src="${product.image}" width="200"><br>
        <h2>${product.name}</h2>
        <p><strong>Price:</strong> ₹${product.price}</p>
        <p>${product.description}</p>
        <p><strong>Category:</strong> ${product.category}</p>
      </div>
      <hr>
    `;
  });
}

document.getElementById("categoryFilter").addEventListener("change", function() {
  const selected = this.value;

  if (selected === "all") {
    displayProducts(allProducts);
  } else {
    const filtered = allProducts.filter(p => p.category === selected);
    displayProducts(filtered);
  }
});
</script>

</body>
</html>
