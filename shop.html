<!DOCTYPE html>
<html>
<head>
  <title>My Shop</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    h2 {
      margin: 0;
    }
  </style>
</head>
<body>

<h1>My Products</h1>
<div id="products"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec")
.then(res => res.json())
.then(data => {
  let container = document.getElementById("products");
  data.forEach(product => {
    container.innerHTML += `
  <div class="product">
    <img src="${product.image}" width="200"><br>
    <h2>${product.name}</h2>
    <p><strong>Price:</strong> ₹${product.price}</p>
    <p>${product.description}</p>
  </div>
`;
});
</script>

</body>
</html>
