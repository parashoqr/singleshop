<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Premium Shop</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      color: #222;
      padding: 20px 0;
      font-size: 2.5em;
    }

    #categoryFilter {
      display: block;
      margin: 0 auto 20px auto;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      background: white;
      cursor: pointer;
    }

    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .product-card {
      background: linear-gradient(135deg, #ffffff, #e6f0ff);
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    }

    .product-card img {
      width: 180px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: transform 0.3s;
    }

    .product-card img:hover {
      transform: scale(1.05);
    }

    .product-card h2 {
      margin: 5px 0;
      font-size: 1.4em;
      color: #333;
    }

    .product-card p {
      margin: 3px 0;
      color: #555;
    }

    .product-card .price {
      font-weight: bold;
      color: #ff4d6d;
      font-size: 1.2em;
    }

    .product-card .category {
      display: inline-block;
      margin-top: 5px;
      padding: 3px 10px;
      background: #007bff;
      color: white;
      border-radius: 20px;
      font-size: 0.85em;
    }

    @media(max-width: 600px){
      #products {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
      .product-card img {
        width: 140px;
      }
    }
  </style>
</head>
<body>

<h1>My Premium Shop</h1>

<select id="categoryFilter">
  <option value="all">All Categories</option>
</select>

<div id="products"></div>

<script>
const EXEC_URL = "https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec"; // same Apps Script /exec

// Load products for customers
function fetchProducts(){
  fetch(EXEC_URL)
    .then(res => res.json())
    .then(data => {
      if(data.shopStatus !== "on"){
        document.getElementById("shopContainer").innerHTML = "<h2>Shop is currently closed</h2>";
        return;
      }

      const container = document.getElementById("shopContainer");
      container.innerHTML = "";

      data.products.forEach(p => {
        container.innerHTML += `
          <div class="product-card">
            <img src="${p.image}" style="width:120px; height:auto; border-radius:5px;">
            <h3>${p.name}</h3>
            <p>Price: ₹${p.price}</p>
            <p>${p.description}</p>
            <small>Category: ${p.category}</small>
          </div>`;
      });
    })
    .catch(err => console.error("Error fetching products:", err));
}

// On page load
fetchProducts();
</script>
</body>
</html>
