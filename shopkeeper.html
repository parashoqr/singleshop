<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopkeeper Dashboard</title>
<style>
body { font-family: Arial; margin: 20px; background:#f9f9f9; }
h1,h2 { color:#333; }
form { background:#fff; padding:15px; border-radius:5px; max-width:500px; margin-bottom:20px; box-shadow:0 0 5px rgba(0,0,0,0.1); }
input,textarea { width:100%; padding:8px; margin:5px 0; box-sizing:border-box; }
button { padding:5px 10px; margin:2px; cursor:pointer; }
ul li { margin-bottom:5px; }
</style>
</head>
<body>

<h1>Shopkeeper Dashboard</h1>

<h2>Add Product</h2>
<form id="addProductForm">
  <input type="text" name="name" placeholder="Product Name" required>
  <input type="number" name="price" placeholder="Price" required>
  <textarea name="description" placeholder="Description" required></textarea>
  <input type="text" name="category" placeholder="Category" required>
  <input type="text" name="image" placeholder="Image URL">
  <button type="submit">Add Product</button>
</form>

<h2>Your Products</h2>
<ul id="productsList"></ul>

<script>
const EXEC_URL = "https://script.google.com/macros/s/AKfycbywUwcl7CPB_e4LgTg23lAdZmkydLJ03KKYOXGiYeMpXNuHV1p3OpJNgd6ZrdaIxdceRA/exec";

// Fetch products
async function fetchProducts(){
  try{
    const res = await fetch(EXEC_URL);
    const data = await res.json();
    const list = document.getElementById("productsList");
    list.innerHTML = "";
    data.products.forEach(p=>{
      const li = document.createElement("li");
      li.innerHTML = `${p.name} | ${p.price} | ${p.category} <button onclick="deleteProduct(${p.rowIndex})">Delete</button>`;
      list.appendChild(li);
    });
  }catch(err){ alert("Error fetching products: "+err); }
}

// Add product
document.getElementById("addProductForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(this).entries());
  try{
    const res = await fetch(EXEC_URL,{
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });
    alert(await res.text());
    this.reset();
    fetchProducts();
  }catch(err){ alert("Error adding product: "+err); }
});

// Delete product
async function deleteProduct(row){
  if(!confirm("Delete this product?")) return;
  try{
    const res = await fetch(EXEC_URL+"?row="+row,{ method:"DELETE" });
    alert(await res.text());
    fetchProducts();
  }catch(err){ alert("Error deleting product: "+err); }
}

// Initial load
fetchProducts();
</script>

</body>
</html>
